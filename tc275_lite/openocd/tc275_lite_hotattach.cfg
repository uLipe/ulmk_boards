# tc275_lite/openocd/tc275_lite_hotattach.cfg
#
# Hot-attach to a RUNNING/failed target WITHOUT asserting /PORST, so the
# sticky reset-cause bits (SCU_RSTSTAT) and SMU alarm status survive the
# connect.  The default tc27x.cfg uses `connect_assert_srst`, which on this
# kit drives /PORST and therefore CLEARS exactly the evidence we need.
#
# Use only for post-mortem register reads after a standalone (button/USB)
# red-ESR0 boot — never for flashing.

source [find interface/tas_client.cfg]
source [find target/infineon/tc27x.cfg]

# Override: do not touch reset lines while connecting.
reset_config none separate
