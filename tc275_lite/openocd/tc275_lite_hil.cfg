# tc275_lite/openocd/tc275_lite_hil.cfg — CPU0-only for HIL polling (avoids SMP poll storms).

source [find interface/tas_client.cfg]

set _CHIPNAME tc27x
set _OCDS_TAPID 0x001DA083

reset_config srst_only srst_nogate connect_assert_srst

tas newtap $_CHIPNAME ocds -irlen 8 \
	-expected-id 0x001DA083 \
	-expected-id 0x101DA083 \
	-expected-id 0x201DA083 \
	-expected-id 0x301DA083 \
	-expected-id 0x401DA083 \
	-expected-id 0x501DA083
ocds create tc27x -chain-position $_CHIPNAME.ocds

target create $_CHIPNAME.cpu0 aurix -coreid 0 -ocds tc27x

flash bank pflash0 tc3xx 0x80000000 0x400000 0 0 $_CHIPNAME.cpu0

targets $_CHIPNAME.cpu0
gdb breakpoint_override hard

# After SRST: unlock CBS EndInit (OCDS-only) + disarm WDTs via DAP.
# CBS_OCNTRL must NOT be mirrored from CPU code — that traps on PORST/button.
# Software WDT disable: board_wdt_early.S + board_init IfxScuWdt_*.
#
# OC3_P|OC3 = 0xC0 → OSTATE.ENIDIS (EndInit override for flash/debug).
$_CHIPNAME.cpu0 configure -event reset-end {
	mww 0xF000047C 0x000000C0
	mww 0xF0036104 0x00000008
	mww 0xF0036110 0x00000008
	mww 0xF003611C 0x00000008
	mww 0xF00360F4 0x00000008
}
# Note: flash.sh / debug.sh disable this event during FEAT_RESET, then call
# ulmk_release_run() on a hot-attach session (avoids "OCDS sequence" races).

# Tcl helpers: leave the core runnable after flash/detach.
#
# OCNTRL OCx_P|OCx sets the matching OSTATE bit; OCx_P alone clears it.
# OSTATE.HARR (bit 8) is driven by OJC0 (OJC0_P=bit16) — TAS RESET_AND_HALT
# leaves HARR sticky so the next button/PORST boots halted at STAD.
proc ulmk_clear_cpu0_triggers {} {
	set base 0xF881F000
	for {set i 0} {$i < 8} {incr i} {
		set adr [expr {$base + $i * 8}]
		mww $adr 0
		mww [expr {$adr + 4}] 0
	}
}

proc ulmk_clear_harr {} {
	# OJC0_P only → clear OSTATE.HARR (do not set OJC0).
	mww 0xF000047C 0x00010000
}

proc ulmk_release_run {} {
	ulmk_clear_cpu0_triggers
	ulmk_clear_harr
	# OC3_P|OC3 → OSTATE.ENIDIS (same as reset-end).  Hot-attach skips
	# reset-end; without ENIDIS, board_init ASCLIN0 CLC writes are ignored.
	mww 0xF000047C 0x000000C0
	# Disarm all CPU WDTs — SMP secondaries race DR before self-disable.
	mww 0xF0036104 0x00000008
	mww 0xF0036110 0x00000008
	mww 0xF003611C 0x00000008
	mww 0xF00360F4 0x00000008
	# DBGSR.HALT = 10b (run).  Blind write avoids mrw (not in this OpenOCD).
	mww 0xF881FD00 0x00000004
}
