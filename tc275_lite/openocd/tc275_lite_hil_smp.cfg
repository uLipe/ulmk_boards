# tc275_lite_hil_smp.cfg — CPU0 + CPU1 for SMP HIL / dual-core GDB.
#
# CPU1 uses -defer-examine so OpenOCD does not poll it continuously (the
# UP hil.cfg stays CPU0-only to avoid those storms).  Examine CPU1 when
# needed:  monitor targets tc27x.cpu1 ; monitor halt

source [find interface/tas_client.cfg]

set _CHIPNAME tc27x
set _OCDS_TAPID 0x001DA083

reset_config srst_only srst_nogate connect_assert_srst

tas newtap $_CHIPNAME ocds -irlen 8 \
	-expected-id 0x001DA083 \
	-expected-id 0x101DA083 \
	-expected-id 0x201DA083 \
	-expected-id 0x301DA083 \
	-expected-id 0x401DA083 \
	-expected-id 0x501DA083
ocds create tc27x -chain-position $_CHIPNAME.ocds

target create $_CHIPNAME.cpu0 aurix -coreid 0 -ocds tc27x
target create $_CHIPNAME.cpu1 aurix -coreid 1 -ocds tc27x
$_CHIPNAME.cpu1 configure -defer-examine

flash bank pflash0 tc3xx 0x80000000 0x400000 0 0 $_CHIPNAME.cpu0

targets $_CHIPNAME.cpu0
gdb breakpoint_override hard

# Disarm WDTCPU0/1/2 + safety WDT — SMP bring-up starts CPU1; default WDT resets.
$_CHIPNAME.cpu0 configure -event reset-end {
	mww 0xF000047C 0x000000C0
	mww 0xF0036104 0x00000008
	mww 0xF0036110 0x00000008
	mww 0xF003611C 0x00000008
	mww 0xF00360F4 0x00000008
}
