# tc275_lite/openocd/target/infineon/tc27x.cfg — SAK-TC275 (TC27xT)
#
# Matched against TAS device_type (see tas_device_family.h in aurix-openocd).

if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME tc27x
}

if { [info exists OCDS_TAPID] } {
	set _OCDS_TAPID $OCDS_TAPID
} else {
	set _OCDS_TAPID 0x001DA083
}

reset_config srst_only srst_nogate connect_assert_srst

tas newtap $_CHIPNAME ocds -irlen 8 \
	-expected-id 0x001DA083 \
	-expected-id 0x101DA083 \
	-expected-id 0x201DA083 \
	-expected-id 0x301DA083 \
	-expected-id 0x401DA083 \
	-expected-id 0x501DA083
ocds create tc27x -chain-position $_CHIPNAME.ocds

target create $_CHIPNAME.cpu0 aurix -coreid 0 -ocds tc27x
target create $_CHIPNAME.cpu1 aurix -coreid 1 -ocds tc27x
target create $_CHIPNAME.cpu2 aurix -coreid 2 -ocds tc27x

# TC275TP: 4 MiB program flash @ 0x80000000 (NC; cached alias 0xA0000000 is the same array)
flash bank pflash0 tc3xx 0x80000000 0x400000 0 0 $_CHIPNAME.cpu0

targets $_CHIPNAME.cpu0

# PFlash: force hardware breakpoints (software patch cannot write flash)
gdb breakpoint_override hard
